<div id="root"></div>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

function App() {
  return (
    <DesignCanvas>

      <DCSection id="flow" title="App Flow" subtitle="Dashboard  →  Submit Repo  →  Report">
        <DCArtboard id="dashboard" label="Dashboard — Projects" width={1440} height={820}>
          <WFDashboard />
        </DCArtboard>
        <DCArtboard id="submit" label="Submit Repo" width={800} height={620}>
          <WFSubmitRepo />
        </DCArtboard>
      </DCSection>

      <DCSection id="report" title="Report View — 3 Variations"
        subtitle="Each shows a different active tab · 4 tabs total: Architecture Map · Code Graph · Vulnerabilities · API">
        <DCArtboard id="varA" label="A · Left Navigation  (Arch Map active)" width={1440} height={900}>
          <WFReportA />
        </DCArtboard>
        <DCArtboard id="varB" label="B · Top Tabs  (Code Graph active)" width={1440} height={900}>
          <WFReportB />
        </DCArtboard>
        <DCArtboard id="varC" label="C · Dense Dashboard  (Vulnerabilities active)" width={1440} height={900}>
          <WFReportC />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
