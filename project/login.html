<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STRATUM — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared-styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .login-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--disp);
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .login-logo .dot {
      color: var(--acc);
    }

    .login-tagline {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--mut);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .login-divider span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .login-form {
      text-align: left;
    }

    .login-field {
      margin-bottom: 20px;
    }

    .login-btn {
      width: 100%;
      margin-top: 8px;
    }

    .login-footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .login-footer p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
    }

    .login-footer a {
      color: var(--acc);
      text-decoration: underline;
    }

    .oauth-btn {
      width: 100%;
      background: var(--bg);
      margin-bottom: 12px;
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Background decoration */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line2) 1px, transparent 1px),
        linear-gradient(90deg, var(--line2) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.5;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255, 54, 46, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="wrap">
      <a href="STRATUM%20Editorial.html" class="brand">
        <span class="logo">STRATUM<span class="dot">.</span></span>
      </a>
    </div>
  </header>

  <!-- Login Content -->
  <main class="login-page">
    <div class="login-card">
      <div class="login-logo">STRATUM<span class="dot">.</span></div>
      <p class="login-tagline">Codebase Intelligence Platform</p>

      <!-- OAuth Buttons (placeholder for Supabase auth) -->
      <button class="btn oauth-btn" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>

      <button class="btn oauth-btn" onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="login-divider">
        <span>or</span>
      </div>

      <!-- Email Login (placeholder) -->
      <form class="login-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html'">
        <div class="login-field">
          <label class="label" for="email">Email</label>
          <input type="email" id="email" class="input" placeholder="you@company.com">
        </div>
        <div class="login-field">
          <label class="label" for="password">Password</label>
          <input type="password" id="password" class="input" placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-fill login-btn">
          Go Now
        </button>
      </form>

      <div class="login-footer">
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </div>
  </main>
</body>
</html>
